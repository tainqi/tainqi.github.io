  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
  <style>
    body{
    margin: 0;
    padding: 20px 0;
}
div{
    width: 80vw;
    min-height: 15vh;
    background: white;
    border-radius: 4px;
    margin: 0 auto;
    position: relative;
    border-top: 1px dashed #333;
}
div:first-child{
    border: none;
}

div::before,div::after{
    content: '';
    width: 20px;
    height: 20px;
    border-radius: 50%;
    position: absolute;
    z-index: 999;
}
div::before{
    left: -10px;
    top: -10px;
}
div::after{
    right: -10px;
    top: -10px;
}
div:first-child::before,div:first-child::after{
    content: '';
    width: 0;
    height: 0;
}
</style>

</head>
